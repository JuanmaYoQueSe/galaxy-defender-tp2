<!DOCTYPE html><html lang="es"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Galaxy Defender Final</title>
<link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css">
<meta name="theme-color" content="#0b1020"></head><body>
<div id="tutorial" class="modal"><div class="box"><h2>Tutorial</h2>
<p>Haz clic en los meteoritos antes de que desaparezcan. Cada meteorito vale 10 puntos. Tienes 3 vidas.</p>
<button id="closeTutorial">Entendido</button></div></div>
<div id="startScreen"><h1>Galaxy Defender</h1><input id="playerName" placeholder="Nombre"><button id="startBtn">Comenzar</button></div>
<div id="gameUI" style="display:none"><div class="topbar"><span id="playerLabel"></span> | Puntos <span id="score">0</span> | Vidas <span id="lives">3</span> | WS <span id="status">Offline</span></div>
<div class="layout"><div id="gameArea"></div><div class="ranking"><h3>Ranking</h3><ol id="rankingList"></ol></div></div></div>
<script src="game.js"></script></body></html>
